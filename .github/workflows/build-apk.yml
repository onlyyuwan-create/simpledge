name: 构建 APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: 打包度支简账 APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 复制网页文件到 Android 资源目录
        run: |
          mkdir -p android/app/src/main/assets
          cp -r index.html android/app/src/main/assets/
          cp -r css android/app/src/main/assets/
          cp -r js android/app/src/main/assets/
          cp -r icons android/app/src/main/assets/
          cp manifest.json android/app/src/main/assets/
          cp sw.js android/app/src/main/assets/

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 构建 APK（自动版本号）
        uses: gradle/gradle-build-action@v2
        with:
          arguments: assembleRelease -PversionCode=${{ github.run_number }} -PversionName="2.0.${{ github.run_number }}"
          build-root-directory: android
          gradle-version: 8.1

      - name: 签名 APK
        run: |
          keytool -genkey -v -keystore ${{ github.workspace }}/simpledge.keystore \
            -alias simpledge -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass simpledge123 -keypass simpledge123 \
            -dname "CN=Simpledge,O=Simpledge,C=CN" 2>/dev/null
          APKSIGNER=$(find /usr/local/lib/android -name "apksigner" 2>/dev/null | head -1)
          if [ -n "$APKSIGNER" ]; then
            $APKSIGNER sign \
              --ks ${{ github.workspace }}/simpledge.keystore \
              --ks-pass pass:simpledge123 \
              --ks-key-alias simpledge \
              --v2-signing-enabled true \
              android/app/build/outputs/apk/release/app-release-unsigned.apk
          else
            jarsigner -keystore ${{ github.workspace }}/simpledge.keystore \
              -storepass simpledge123 -sigalg SHA256withRSA -digestalg SHA-256 \
              android/app/build/outputs/apk/release/app-release-unsigned.apk simpledge
          fi
          cp android/app/build/outputs/apk/release/app-release-unsigned.apk \
             android/app/build/outputs/apk/release/度支简账.apk

      - name: 生成版本信息
        run: |
          echo '{"versionCode":${{ github.run_number }},"versionName":"2.0.${{ github.run_number }}","updateUrl":"https://github.com/onlyyuwan-create/simpledge/releases/latest/download/度支简账.apk","changelog":"自动构建 #${{ github.run_number }}"}' > android/app/build/outputs/apk/release/version.json

      - name: 上传 APK + 版本信息
        uses: actions/upload-artifact@v4
        with:
          name: 度支简账-APK
          path: |
            android/app/build/outputs/apk/release/度支简账.apk
            android/app/build/outputs/apk/release/version.json
