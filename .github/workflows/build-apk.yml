name: 构建 APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: 打包度支简账 APK
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 PWABuilder CLI
        run: npm install -g @pwabuilder/cli

      - name: 生成 APK
        run: |
          mkdir -p output
          npx pwabuilder package \
            --platform android \
            --url https://onlyyuwan-create.github.io/simpledge/ \
            --output output/

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 度支简账-APK
          path: output/*.apk
